<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Retail shop quotation format illustration">
  <defs>
    <linearGradient id="rs-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1B33"/><stop offset="1" stop-color="#142238"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#rs-bg)"/>
  <circle cx="680" cy="420" r="110" fill="#F59E0B" opacity="0.08"/>
  <!-- Shop front -->
  <rect x="200" y="130" width="400" height="250" rx="12" fill="#1E293B"/>
  <rect x="200" y="130" width="400" height="50" rx="12" fill="#F59E0B" opacity="0.85"/>
  <text x="400" y="163" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#0C1B33" text-anchor="middle">SHREE TRADERS</text>
  <!-- Window shelves -->
  <rect x="220" y="195" width="160" height="90" rx="8" fill="#0F2236"/>
  <rect x="400" y="195" width="180" height="90" rx="8" fill="#0F2236"/>
  <!-- Shelf items left -->
  <rect x="230" y="240" width="30" height="35" rx="4" fill="#3B82F6" opacity="0.7"/>
  <rect x="268" y="248" width="24" height="27" rx="4" fill="#10B981" opacity="0.7"/>
  <rect x="300" y="244" width="28" height="31" rx="4" fill="#8B5CF6" opacity="0.7"/>
  <rect x="336" y="240" width="32" height="35" rx="4" fill="#EF4444" opacity="0.7"/>
  <!-- Shelf items right -->
  <rect x="410" y="240" width="28" height="35" rx="4" fill="#F59E0B" opacity="0.7"/>
  <rect x="446" y="246" width="24" height="29" rx="4" fill="#06B6D4" opacity="0.7"/>
  <rect x="478" y="240" width="32" height="35" rx="4" fill="#10B981" opacity="0.7"/>
  <rect x="518" y="243" width="26" height="32" rx="4" fill="#8B5CF6" opacity="0.7"/>
  <!-- Price tag -->
  <rect x="310" y="310" width="180" height="50" rx="10" fill="#F59E0B" opacity="0.9"/>
  <text x="400" y="342" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#0C1B33" text-anchor="middle">HSN + GST + Rate</text>
  <!-- Door -->
  <rect x="350" y="320" width="100" height="60" rx="6" fill="#0A1628"/>
  <circle cx="355" cy="355" r="5" fill="#F59E0B"/>
  <!-- Labels -->
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">Retail &amp; Trading Business Quotations</text>
  <text x="400" y="458" font-family="system-ui,sans-serif" font-size="15" fill="#64748B" text-anchor="middle">HSN codes, bulk pricing, and trader formats</text>
</svg>

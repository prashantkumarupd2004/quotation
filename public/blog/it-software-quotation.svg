<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="IT software quotation guide illustration">
  <defs>
    <linearGradient id="it-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1A2E"/><stop offset="1" stop-color="#0F2942"/>
    </linearGradient>
    <linearGradient id="it-screen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1E3A5F"/><stop offset="1" stop-color="#0F2236"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#it-bg)"/>
  <circle cx="720" cy="60" r="110" fill="#3B82F6" opacity="0.10"/>
  <circle cx="60" cy="460" r="90" fill="#06B6D4" opacity="0.08"/>
  <!-- Monitor -->
  <rect x="180" y="100" width="440" height="270" rx="14" fill="url(#it-screen)" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="340" y="370" width="120" height="18" rx="4" fill="#1E3A5F"/>
  <rect x="310" y="388" width="180" height="10" rx="5" fill="#1E3A5F"/>
  <!-- Code lines -->
  <rect x="210" y="135" width="80" height="9" rx="4" fill="#06B6D4" opacity="0.8"/>
  <rect x="210" y="155" width="140" height="8" rx="4" fill="#3B82F6" opacity="0.6"/>
  <rect x="210" y="173" width="110" height="8" rx="4" fill="#8B5CF6" opacity="0.6"/>
  <rect x="210" y="191" width="160" height="8" rx="4" fill="#3B82F6" opacity="0.5"/>
  <rect x="210" y="215" width="90" height="8" rx="4" fill="#10B981" opacity="0.7"/>
  <rect x="210" y="233" width="130" height="8" rx="4" fill="#3B82F6" opacity="0.5"/>
  <!-- Quote panel on right side of monitor -->
  <rect x="380" y="125" width="220" height="225" rx="10" fill="#0A1628" opacity="0.8"/>
  <text x="490" y="165" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#06B6D4" text-anchor="middle">Project Quotation</text>
  <rect x="395" y="175" width="190" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="395" y="190" width="150" height="6" rx="3" fill="#1E3A5F"/>
  <rect x="395" y="205" width="170" height="6" rx="3" fill="#1E3A5F"/>
  <rect x="395" y="235" width="190" height="24" rx="6" fill="#3B82F6" opacity="0.4"/>
  <text x="490" y="252" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">₹ 1,80,000 + GST</text>
  <rect x="395" y="270" width="190" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="395" y="285" width="140" height="6" rx="3" fill="#1E3A5F"/>
  <!-- Text -->
  <text x="400" y="445" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">IT &amp; Software Project Quotations</text>
  <text x="400" y="472" font-family="system-ui,sans-serif" font-size="15" fill="#64748B" text-anchor="middle">Scope, milestones, and pricing for tech projects</text>
</svg>

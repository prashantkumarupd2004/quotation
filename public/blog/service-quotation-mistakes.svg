<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Service business quotation mistakes illustration">
  <defs>
    <linearGradient id="sb-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1E"/><stop offset="1" stop-color="#0F1628"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#sb-bg)"/>
  <circle cx="700" cy="420" r="120" fill="#8B5CF6" opacity="0.08"/>
  <!-- 5 mistake cards -->
  <rect x="80" y="100" width="130" height="80" rx="10" fill="#1E1040" stroke="#EF4444" stroke-width="1.5"/>
  <text x="145" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="600">No Validity</text>
  <text x="145" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Period stated</text>

  <rect x="230" y="100" width="130" height="80" rx="10" fill="#1E1040" stroke="#EF4444" stroke-width="1.5"/>
  <text x="295" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="600">Vague Scope</text>
  <text x="295" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">"as discussed"</text>

  <rect x="380" y="100" width="130" height="80" rx="10" fill="#1E1040" stroke="#EF4444" stroke-width="1.5"/>
  <text x="445" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="600">GST Missing</text>
  <text x="445" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">No tax breakdown</text>

  <rect x="530" y="100" width="130" height="80" rx="10" fill="#1E1040" stroke="#EF4444" stroke-width="1.5"/>
  <text x="595" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="600">No Payment</text>
  <text x="595" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Terms included</text>

  <!-- Arrow down to solution -->
  <line x1="400" y1="195" x2="400" y2="245" stroke="#10B981" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="392,238 408,238 400,255" fill="#10B981"/>
  <text x="400" y="220" font-family="system-ui,sans-serif" font-size="12" fill="#10B981" text-anchor="middle">Fix these →</text>

  <!-- Solution card -->
  <rect x="200" y="265" width="400" height="100" rx="14" fill="#0A2418" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="305" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#10B981" text-anchor="middle">Professional Service Quotation</text>
  <text x="400" y="327" font-family="system-ui,sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Scope · GST · Validity · Payment Terms · Signature</text>
  <text x="400" y="348" font-family="system-ui,sans-serif" font-size="13" fill="#64748B" text-anchor="middle">= Faster approvals, fewer disputes</text>

  <!-- Labels -->
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">Service Business Quotation Mistakes</text>
  <text x="400" y="458" font-family="system-ui,sans-serif" font-size="15" fill="#64748B" text-anchor="middle">5 common errors costing you clients</text>
</svg>

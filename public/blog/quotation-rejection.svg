<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Quotation rejection reasons illustration">
  <defs>
    <linearGradient id="qr-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a0a0a"/><stop offset="1" stop-color="#1E1030"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#qr-bg)"/>
  <circle cx="700" cy="100" r="130" fill="#EF4444" opacity="0.08"/>
  <circle cx="80" cy="400" r="100" fill="#F59E0B" opacity="0.07"/>
  <!-- Document with X -->
  <rect x="260" y="100" width="280" height="320" rx="14" fill="#1E293B" stroke="#EF4444" stroke-width="2"/>
  <!-- Lines -->
  <rect x="290" y="145" width="180" height="10" rx="5" fill="#475569"/>
  <rect x="290" y="170" width="220" height="8" rx="4" fill="#334155"/>
  <rect x="290" y="190" width="200" height="8" rx="4" fill="#334155"/>
  <rect x="290" y="230" width="160" height="8" rx="4" fill="#334155"/>
  <rect x="290" y="250" width="200" height="8" rx="4" fill="#334155"/>
  <rect x="290" y="270" width="180" height="8" rx="4" fill="#334155"/>
  <!-- Big X stamp -->
  <circle cx="400" cy="310" r="55" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="2"/>
  <line x1="370" y1="280" x2="430" y2="340" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="430" y1="280" x2="370" y2="340" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
  <!-- Text -->
  <text x="400" y="455" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">Why Quotes Get Rejected</text>
  <text x="400" y="482" font-family="system-ui,sans-serif" font-size="15" fill="#94A3B8" text-anchor="middle">And how to fix each one</text>
</svg>

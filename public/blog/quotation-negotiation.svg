<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Quotation negotiation tips illustration">
  <defs>
    <linearGradient id="neg-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/><stop offset="1" stop-color="#1A0A2E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#neg-bg)"/>
  <circle cx="720" cy="80" r="120" fill="#F59E0B" opacity="0.08"/>
  <circle cx="80" cy="430" r="100" fill="#8B5CF6" opacity="0.08"/>
  <!-- Two speech bubbles - negotiation -->
  <rect x="80" y="130" width="260" height="110" rx="20" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="130,240 150,240 140,265" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="210" y="180" font-family="system-ui,sans-serif" font-size="15" fill="#94A3B8" text-anchor="middle">Your price seems</text>
  <text x="210" y="200" font-family="system-ui,sans-serif" font-size="15" fill="#94A3B8" text-anchor="middle">a bit high...</text>
  <text x="210" y="226" font-family="system-ui,sans-serif" font-size="26" fill="#EF4444" text-anchor="middle">— Client</text>

  <rect x="460" y="130" width="260" height="130" rx="20" fill="#1E2A18" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="660,260 680,260 670,285" fill="#1E2A18" stroke="#10B981" stroke-width="1.5"/>
  <text x="590" y="176" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Here's the scope</text>
  <text x="590" y="196" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">breakdown — let's</text>
  <text x="590" y="216" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">adjust what you need</text>
  <text x="590" y="240" font-family="system-ui,sans-serif" font-size="22" fill="#10B981" text-anchor="middle">— You ✓</text>

  <!-- Handshake icon area -->
  <text x="400" y="340" font-family="system-ui,sans-serif" font-size="56" fill="#F59E0B" opacity="0.25" text-anchor="middle">🤝</text>

  <!-- Labels -->
  <text x="400" y="420" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">Negotiating Quotations Without Losing</text>
  <text x="400" y="450" font-family="system-ui,sans-serif" font-size="15" fill="#64748B" text-anchor="middle">Hold your price — adjust scope instead</text>
</svg>

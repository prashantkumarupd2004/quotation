<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Purchase order vs quotation illustration">
  <defs>
    <linearGradient id="po-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1628"/><stop offset="1" stop-color="#0F2236"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#po-bg)"/>
  <circle cx="700" cy="80" r="110" fill="#6366F1" opacity="0.09"/>
  <circle cx="100" cy="440" r="90" fill="#10B981" opacity="0.08"/>
  <!-- Left: Quotation doc -->
  <rect x="100" y="100" width="220" height="280" rx="14" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="100" y="100" width="220" height="40" rx="14" fill="#6366F1" opacity="0.8"/>
  <text x="210" y="126" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">QUOTATION</text>
  <rect x="120" y="158" width="150" height="8" rx="4" fill="#334155"/>
  <rect x="120" y="175" width="180" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="120" y="190" width="160" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="120" y="220" width="180" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="120" y="235" width="140" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="120" y="270" width="180" height="30" rx="6" fill="#6366F1" opacity="0.3"/>
  <text x="210" y="290" font-family="system-ui,sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">Valid 15 days · GST excl.</text>
  <text x="210" y="340" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Seller sends this</text>
  <text x="210" y="358" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">→ asking to buy</text>

  <!-- Arrow -->
  <line x1="335" y1="240" x2="465" y2="240" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="8,5"/>
  <polygon points="455,232 475,240 455,248" fill="#F59E0B"/>
  <text x="400" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#F59E0B" text-anchor="middle">converts to</text>

  <!-- Right: PO doc -->
  <rect x="480" y="100" width="220" height="280" rx="14" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <rect x="480" y="100" width="220" height="40" rx="14" fill="#10B981" opacity="0.8"/>
  <text x="590" y="126" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">PURCHASE ORDER</text>
  <rect x="500" y="158" width="150" height="8" rx="4" fill="#334155"/>
  <rect x="500" y="175" width="180" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="500" y="190" width="160" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="500" y="220" width="180" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="500" y="235" width="140" height="7" rx="3" fill="#1E3A5F"/>
  <rect x="500" y="270" width="180" height="30" rx="6" fill="#10B981" opacity="0.3"/>
  <text x="590" y="290" font-family="system-ui,sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">Legally binding · Buyer issues</text>
  <text x="590" y="340" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Buyer sends this</text>
  <text x="590" y="358" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">← confirming order</text>

  <!-- Labels -->
  <text x="400" y="440" font-family="system-ui,sans-serif" font-size="25" font-weight="700" fill="#fff" text-anchor="middle">Purchase Order vs Quotation</text>
  <text x="400" y="468" font-family="system-ui,sans-serif" font-size="15" fill="#64748B" text-anchor="middle">Which comes first and what each one means</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Email quotation tips illustration">
  <defs>
    <linearGradient id="eq-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/><stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="eq-card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#6366F1"/><stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#eq-bg)"/>
  <circle cx="680" cy="80" r="120" fill="#6366F1" opacity="0.12"/>
  <circle cx="100" cy="420" r="100" fill="#8B5CF6" opacity="0.10"/>
  <!-- Envelope -->
  <rect x="220" y="140" width="360" height="240" rx="16" fill="url(#eq-card)" opacity="0.9"/>
  <polyline points="220,156 400,270 580,156" stroke="#fff" stroke-width="2.5" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <line x1="220" y1="380" x2="340" y2="280" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="580" y1="380" x2="460" y2="280" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <!-- ₹ badge -->
  <circle cx="580" cy="155" r="40" fill="#F59E0B"/>
  <text x="580" y="172" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#fff" text-anchor="middle">₹</text>
  <!-- Labels -->
  <text x="400" y="450" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle" opacity="0.9">Send Quotations by Email</text>
  <text x="400" y="480" font-family="system-ui,sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle">The right way to get faster approvals</text>
</svg>

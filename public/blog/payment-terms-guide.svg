<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Payment terms guide illustration">
  <defs>
    <linearGradient id="pt-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1628"/><stop offset="1" stop-color="#14223A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="28" fill="url(#pt-bg)"/>
  <circle cx="640" cy="100" r="100" fill="#10B981" opacity="0.10"/>
  <circle cx="140" cy="400" r="110" fill="#F59E0B" opacity="0.08"/>
  <!-- Timeline bar -->
  <rect x="120" y="230" width="560" height="8" rx="4" fill="#1E3A5F"/>
  <!-- Milestone circles -->
  <circle cx="160" cy="234" r="22" fill="#10B981"/>
  <text x="160" y="241" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">30%</text>
  <text x="160" y="270" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Advance</text>

  <circle cx="330" cy="234" r="22" fill="#3B82F6"/>
  <text x="330" y="241" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">40%</text>
  <text x="330" y="270" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Milestone</text>

  <circle cx="500" cy="234" r="22" fill="#8B5CF6"/>
  <text x="500" y="241" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">30%</text>
  <text x="500" y="270" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">On Delivery</text>

  <circle cx="660" cy="234" r="22" fill="#F59E0B"/>
  <text x="660" y="241" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">✓</text>
  <text x="660" y="270" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Done</text>

  <!-- Rupee icons top -->
  <text x="250" y="140" font-family="system-ui,sans-serif" font-size="60" fill="#F59E0B" opacity="0.25" text-anchor="middle">₹</text>
  <text x="560" y="160" font-family="system-ui,sans-serif" font-size="48" fill="#10B981" opacity="0.20" text-anchor="middle">₹</text>

  <!-- Labels -->
  <text x="400" y="340" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">Payment Terms in Quotations</text>
  <text x="400" y="370" font-family="system-ui,sans-serif" font-size="16" fill="#64748B" text-anchor="middle">Advance · Milestone · Net 30 explained</text>
</svg>
